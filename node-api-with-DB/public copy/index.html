<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Task Manager</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h1>Task Manager</h1>
            <form id="task-form">
                <input type="text" id="taskText" placeholder="Enter a new task" required>
                <button type="submit">Add Button</button>
            </form>
            
            <div id="task"> 
                <h2>Task List</h2>
                <div id="tasksList"></div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
