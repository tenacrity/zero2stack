<!DOCTYPE html>
<html>
  <head>
    <title>CORS Demo</title>
  </head>
  <body>
    <script>
      fetch("http://localhost:4000/api/time")
        .then((response) => response.json())
        .then((data) => {
          document.body.innerText = "Server Time: " + data.now;
        })
        .catch((err) => {
          console.error("Fetch failed:", err);
        });
    </script>
  </body>
</html>
