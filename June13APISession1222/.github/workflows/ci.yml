name: Node.js CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - run: npm install

      - name: Apply Migrations
        run: npm run migrate
        env:
          DATABASE_URL: postgresql://zero2:secret@localhost:5432/zero2db

      - name: Run Tests
        run: npm test
        env:
          DATABASE_URL: postgresql://zero2:secret@localhost:5432/zero2db
