<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Task Manager</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</head>
<body class="bg-light">
  <div class="container mt-5">
    <h1 class="text-center mb-4">Task Manager</h1>
    <div class="row justify-content-center">
      <div class="col-md-6">
        <form id="taskForm" class="input-group mb-4">
          <input type="text" id="taskText" class="form-control" placeholder="Enter task text" required />
          <button class="btn btn-dark" type="submit">Add Task</button>
        </form>

        <h4>Tasks</h4>
        <div id="tasksList">
          {% for task in tasks %}
            <div class="card mb-3">
              <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                  <strong>{{ task.text }}</strong><br />
                  <small class="text-muted">
                    Created: {{ task.created_at.strftime("%d/%m/%Y, %I:%M:%S %p") }}
                  </small>
                </div>
                <button class="btn btn-danger btn-sm" onclick="deleteTask({{ task.id }})">Delete</button>
              </div>
            </div>
          {% endfor %}
        </div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById("taskForm");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = document.getElementById("taskText").value;
      if (!text.trim()) return;
      await fetch("/tasks", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text }),
      });
      window.location.reload();
    });

    async function deleteTask(id) {
      await fetch(`/tasks/${id}`, { method: "DELETE" });
      window.location.reload();
    }
  </script>
</body>
</html>
